services:
  mysql:
    image: mysql:8.0
    container_name: anime-catalog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: anime_catalog_db
    ports:
      - "3306:3306"
    volumes:
      - anime-catalog-data:/var/lib/mysql

  api:
    image: animecatalog-api:1.0
    container_name: anime-catalog-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://anime-catalog-mysql:3306/anime_catalog_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      - mysql

volumes:
  anime-catalog-data: